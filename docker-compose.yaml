name: it-recruiter-monorepo

services:
  postgres:
    image: postgres:16
    container_name: monorepo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - backend

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: monorepo_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: app
      RABBITMQ_DEFAULT_PASS: app
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - backend

  file-minio:
    image: minio/minio:latest
    container_name: monorepo_file_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - file_minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
    networks:
      - backend

  search-elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.4
    container_name: monorepo_search_elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - search_elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
    networks:
      - backend

  search-etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: monorepo_search_etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: >
      etcd
      -advertise-client-urls=http://search-etcd:2379
      -listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    volumes:
      - search_etcd_data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health", "--endpoints=http://localhost:2379"]
      interval: 15s
      timeout: 10s
      retries: 20
    networks:
      - backend

  search-minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: monorepo_search_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: minio server /minio_data --console-address ":9001"
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - search_minio_data:/minio_data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
    networks:
      - backend

  search-milvus:
    image: milvusdb/milvus:v2.6.11
    container_name: monorepo_search_milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: search-etcd:2379
      MINIO_ADDRESS: search-minio:9000
      COMMON_STORAGETYPE: local
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - search_milvus_data:/var/lib/milvus
    depends_on:
      search-etcd:
        condition: service_healthy
      search-minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9091/healthz >/dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 30
    networks:
      - backend

  auth-migrator:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    container_name: auth_migrator
    restart: "no"
    env_file:
      - path: ./services/auth/.env
        required: true
    volumes:
      - ./services/auth:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head"
    networks:
      - backend

  candidate-migrator:
    build:
      context: ./services/candidate
      dockerfile: Dockerfile
    container_name: candidate_migrator
    restart: "no"
    env_file:
      - path: ./services/candidate/.env
        required: true
    volumes:
      - ./services/candidate:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head"
    networks:
      - backend

  employer-migrator:
    build:
      context: ./services/employer
      dockerfile: Dockerfile
    container_name: employer_migrator
    restart: "no"
    env_file:
      - path: ./services/employer/.env
        required: true
    volumes:
      - ./services/employer:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head"
    networks:
      - backend

  file-migrator:
    build:
      context: ./services/file
      dockerfile: Dockerfile
    container_name: file_migrator
    restart: "no"
    env_file:
      - path: ./services/file/.env
        required: true
    volumes:
      - ./services/file:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head"
    networks:
      - backend
  
  bot-migrator:
    build:
      context: ./services/bot
      dockerfile: Dockerfile
    container_name: bot_migrator
    restart: "no"
    env_file:
      - path: ./services/bot/.env
        required: true
    volumes:
      - ./services/bot:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head"
    networks:
      - backend

  auth-api:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    container_name: auth_api
    restart: unless-stopped
    env_file:
      - path: ./services/auth/.env
        required: true
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_TRACES_SAMPLER: parentbased_traceidratio
      OTEL_TRACES_SAMPLER_ARG: "0.2"
    volumes:
      - ./services/auth:/app
    depends_on:
      auth-migrator:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    ports:
      - "8001:8000"
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --proxy-headers
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
    networks:
      - backend

  auth-worker:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    container_name: auth_worker
    restart: unless-stopped
    env_file:
      - path: ./services/auth/.env
        required: true
    volumes:
      - ./services/auth:/app
    depends_on:
      auth-migrator:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    command: >
      python -m app.worker
    networks:
      - backend

  candidate-api:
    build:
      context: ./services/candidate
      dockerfile: Dockerfile
    container_name: candidate_api
    restart: unless-stopped
    env_file:
      - path: ./services/candidate/.env
        required: true
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_TRACES_SAMPLER: parentbased_traceidratio
      OTEL_TRACES_SAMPLER_ARG: "0.2"
    volumes:
      - ./services/candidate:/app
    depends_on:
      candidate-migrator:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    ports:
      - "8002:8000"
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --proxy-headers
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
    networks:
      - backend

  candidate-worker:
    build:
      context: ./services/candidate
      dockerfile: Dockerfile
    container_name: candidate_worker
    restart: unless-stopped
    env_file:
      - path: ./services/candidate/.env
        required: true
    volumes:
      - ./services/candidate:/app
    depends_on:
      candidate-migrator:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    command: >
      python -m app.worker
    networks:
      - backend

  employer-api:
    build:
      context: ./services/employer
      dockerfile: Dockerfile
    container_name: employer_api
    restart: unless-stopped
    env_file:
      - path: ./services/employer/.env
        required: true
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_TRACES_SAMPLER: parentbased_traceidratio
      OTEL_TRACES_SAMPLER_ARG: "0.2"
    volumes:
      - ./services/employer:/app
    depends_on:
      employer-migrator:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    ports:
      - "8003:8000"
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --proxy-headers
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
    networks:
      - backend

  employer-worker:
    build:
      context: ./services/employer
      dockerfile: Dockerfile
    container_name: employer_worker
    restart: unless-stopped
    env_file:
      - path: ./services/employer/.env
        required: true
    volumes:
      - ./services/employer:/app
    depends_on:
      employer-migrator:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    command: >
      python -m app.worker
    networks:
      - backend

  file-api:
    build:
      context: ./services/file
      dockerfile: Dockerfile
    container_name: file_api
    restart: unless-stopped
    env_file:
      - path: ./services/file/.env
        required: true
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_TRACES_SAMPLER: parentbased_traceidratio
      OTEL_TRACES_SAMPLER_ARG: "0.2"
    volumes:
      - ./services/file:/app
    depends_on:
      file-migrator:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      file-minio:
        condition: service_healthy
    ports:
      - "8004:8000"
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --proxy-headers
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
    networks:
      - backend

  file-worker:
    build:
      context: ./services/file
      dockerfile: Dockerfile
    container_name: file_worker
    restart: unless-stopped
    env_file:
      - path: ./services/file/.env
        required: true
    volumes:
      - ./services/file:/app
    depends_on:
      file-migrator:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      file-minio:
        condition: service_healthy
    command: >
      python -m app.worker
    networks:
      - backend

  search-api:
    build:
      context: ./services/search
      dockerfile: Dockerfile
    container_name: search_api
    restart: unless-stopped
    env_file:
      - path: ./services/search/.env
        required: true
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_TRACES_SAMPLER: parentbased_traceidratio
      OTEL_TRACES_SAMPLER_ARG: "0.2"
    volumes:
      - ./services/search:/app
      - hf_cache:/app/.cache
    depends_on:
      rabbitmq:
        condition: service_healthy
      search-elasticsearch:
        condition: service_healthy
      search-milvus:
        condition: service_healthy
    ports:
      - "8005:8000"
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --proxy-headers
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 180s
    networks:
      - backend

  search-worker:
    build:
      context: ./services/search
      dockerfile: Dockerfile
    container_name: search_worker
    restart: unless-stopped
    env_file:
      - path: ./services/search/.env
        required: true
    volumes:
      - ./services/search:/app
      - hf_cache:/app/.cache
    depends_on:
      rabbitmq:
        condition: service_healthy
      search-elasticsearch:
        condition: service_healthy
      search-milvus:
        condition: service_healthy
    command: >
      python -m app.worker
    networks:
      - backend
  
  bot-api:
    build:
      context: ./services/bot
      dockerfile: Dockerfile
    container_name: bot_api
    restart: unless-stopped
    env_file:
      - path: ./services/bot/.env
        required: true
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_TRACES_SAMPLER: parentbased_traceidratio
      OTEL_TRACES_SAMPLER_ARG: "0.2"
    volumes:
      - ./services/bot:/app
    depends_on:
      bot-migrator:
        condition: service_completed_successfully
      auth-api:
        condition: service_healthy
      candidate-api:
        condition: service_healthy
      employer-api:
        condition: service_healthy
      search-api:
        condition: service_healthy
    ports:
      - "8010:8000"
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --proxy-headers
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
    networks:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: monorepo_nginx
    restart: unless-stopped
    depends_on:
      auth-api:
        condition: service_healthy
      candidate-api:
        condition: service_healthy
      employer-api:
        condition: service_healthy
      file-api:
        condition: service_healthy
      search-api:
        condition: service_healthy
      bot-api:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/conf.d:/etc/nginx/conf.d:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
    networks:
      - backend
      - monitoring

  ngrok:
    image: ngrok/ngrok:latest
    container_name: monorepo_ngrok
    restart: unless-stopped
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    command: http http://nginx:80
    ports:
      - "4040:4040"
    depends_on:
      nginx:
        condition: service_healthy
    networks:
      - backend

  prometheus:
    image: prom/prometheus:v3.3.1
    container_name: monorepo_prometheus
    restart: unless-stopped
    depends_on:
      - auth-api
      - candidate-api
      - employer-api
      - file-api
      - search-api
      - bot-api
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    networks:
      - monitoring
      - backend

  grafana:
    image: grafana/grafana:11.6.0
    container_name: monorepo_grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - monitoring

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: monorepo_jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    networks:
      - monitoring
      - backend

networks:
  backend:
    driver: bridge
  monitoring:
    driver: bridge

volumes:
  postgres_data:
  rabbitmq_data:
  file_minio_data:
  search_elasticsearch_data:
  search_etcd_data:
  search_minio_data:
  search_milvus_data:
  prometheus_data:
  grafana_data:
  hf_cache:
