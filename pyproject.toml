[tool.black]
line-length = 100
target-version = ["py312"]
skip-string-normalization = false
exclude = '''
/(
    \.git
  | \.venv
  | __pycache__
  | migrations
  | build
  | dist
)/
'''

[tool.ruff]
line-length = 100
target-version = "py312"

exclude = [
    ".git",
    ".venv",
    "__pycache__",
    "migrations",
    "build",
    "dist"
]

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I"
]

ignore = [
    "E501",
]

[tool.ruff.lint.isort]
known-first-party = ["services"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = [
    "tests",
    "services"
]
python_files = [
    "test_*.py",
]