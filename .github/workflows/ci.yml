name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      auth: ${{ steps.filter.outputs.auth }}
      bot: ${{ steps.filter.outputs.bot }}
      candidate: ${{ steps.filter.outputs.candidate }}
      employer: ${{ steps.filter.outputs.employer }}
      file: ${{ steps.filter.outputs.file }}
      search: ${{ steps.filter.outputs.search }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            auth: 'services/auth/**'
            bot: 'services/bot/**'
            candidate: 'services/candidate/**'
            employer: 'services/employer/**'
            file: 'services/file/**'
            search: 'services/search/**'

  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [ auth, bot, candidate, employer, file, search ]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install Linters
        run: pip install flake8 black isort

      - name: Check formatting with black
        run: black --check --line-length=120 services/${{ matrix.service }}/app
        continue-on-error: true

      - name: Check import sorting with isort
        run: isort --check-only --profile=black --line-length=120 services/${{ matrix.service }}/app
        continue-on-error: true

      - name: Lint with flake8
        run: flake8 services/${{ matrix.service }}/app --count --select=E9,F63,F7,F82 --show-source --statistics

  test-auth:
    needs: [ detect-changes, lint ]
    if: needs.detect-changes.outputs.auth == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_auth
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'services/auth/requirements.txt'
          
      - name: Install dependencies
        run: pip install -r services/auth/requirements.txt
        
      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_auth
          ENVIRONMENT: local
          LOG_LEVEL: INFO
          SECRET_KEY: test_secret_key
          TELEGRAM_BOT_TOKEN: 123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 30
          REFRESH_TOKEN_EXPIRE_DAYS: 7
          INTERNAL_BOT_SECRET: test_secret
        run: |
          cd services/auth
          python -m pytest tests/ --cov=app --cov-report=xml -v

  test-bot:
    needs: [ detect-changes, lint ]
    if: needs.detect-changes.outputs.bot == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'services/bot/requirements.txt'
          
      - name: Install dependencies
        run: pip install -r services/bot/requirements.txt
        
      - name: Run tests with coverage
        env:
          ENVIRONMENT: local
          LOG_LEVEL: INFO
          TELEGRAM_BOT_TOKEN: 123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11
          ADMIN_IDS: "123,456"
          AUTH_SERVICE_URL: http://localhost:8003
          CANDIDATE_SERVICE_URL: http://localhost:8000
          EMPLOYER_SERVICE_URL: http://localhost:8002
          SEARCH_SERVICE_URL: http://localhost:8001
          FILE_SERVICE_URL: http://localhost:8004
          INTERNAL_BOT_SECRET: test_secret
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: |
          cd services/bot
          python -m pytest tests/ --cov=app --cov-report=xml -v

  test-candidate:
    needs: [ detect-changes, lint ]
    if: needs.detect-changes.outputs.candidate == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_candidate
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'services/candidate/requirements.txt'
          
      - name: Install dependencies
        run: pip install -r services/candidate/requirements.txt
        
      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_candidate
          ENVIRONMENT: local
          LOG_LEVEL: INFO
          SECRET_KEY: test_secret_key
          ALGORITHM: HS256
          RABBITMQ_HOST: localhost
          RABBITMQ_PORT: 5672
          RABBITMQ_USER: guest
          RABBITMQ_PASS: guest
          CANDIDATE_EXCHANGE_NAME: candidate_events
          DLQ_EXCHANGE_NAME: candidate_events_dlq
          CIRCUIT_BREAKER_FAILURE_THRESHOLD: 5
          CIRCUIT_BREAKER_RECOVERY_TIMEOUT: 30
          RATE_LIMIT_DEFAULT: 100/minute
          FILE_SERVICE_URL: http://localhost:8004
          EMPLOYER_SERVICE_URL: http://localhost:8002
        run: |
          cd services/candidate
          python -m pytest tests/ --cov=app --cov-report=xml -v

  test-employer:
    needs: [ detect-changes, lint ]
    if: needs.detect-changes.outputs.employer == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_employer
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'services/employer/requirements.txt'
          
      - name: Install dependencies
        run: pip install -r services/employer/requirements.txt
        
      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_employer
          ENVIRONMENT: local
          LOG_LEVEL: INFO
          SECRET_KEY: test_secret_key
          ALGORITHM: HS256
          CANDIDATE_SERVICE_URL: http://localhost:8000
          SEARCH_SERVICE_URL: http://localhost:8001
          CIRCUIT_BREAKER_FAILURE_THRESHOLD: 5
          CIRCUIT_BREAKER_RECOVERY_TIMEOUT: 30
          RATE_LIMIT_DEFAULT: 100/minute
        run: |
          cd services/employer
          python -m pytest tests/ --cov=app --cov-report=xml -v

  test-file:
    needs: [ detect-changes, lint ]
    if: needs.detect-changes.outputs.file == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_file
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'services/file/requirements.txt'
          
      - name: Install dependencies
        run: pip install -r services/file/requirements.txt
        
      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_file
          ENVIRONMENT: local
          LOG_LEVEL: INFO
          SECRET_KEY: test_secret_key
          ALGORITHM: HS256
          S3_ENDPOINT_URL: http://localhost:9000
          S3_ACCESS_KEY: test
          S3_SECRET_KEY: test
          S3_BUCKET_NAME: recruiter-files
          S3_REGION: us-east-1
          MAX_FILE_SIZE: 10485760
          S3_PUBLIC_DOMAIN: http://localhost/s3
        run: |
          cd services/file
          python -m pytest tests/ --cov=app --cov-report=xml -v

  test-search:
    needs: [ detect-changes, lint ]
    if: needs.detect-changes.outputs.search == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'services/search/requirements.txt'
          
      - name: Install dependencies
        run: pip install -r services/search/requirements.txt
        
      - name: Run tests with coverage
        env:
          ENVIRONMENT: local
          LOG_LEVEL: INFO
          SECRET_KEY: test_secret_key
          ALGORITHM: HS256
          ELASTICSEARCH_URL: http://localhost:9200
          CANDIDATE_INDEX_ALIAS: candidates
          MILVUS_HOST: localhost
          MILVUS_PORT: 19530
          MILVUS_COLLECTION_NAME: candidates_embeddings
          CANDIDATE_SERVICE_URL: http://localhost:8000
          SENTENCE_MODEL_NAME: paraphrase-multilingual-mpnet-base-v2
          RANKER_MODEL_NAME: cross-encoder/ms-marco-MiniLM-L-6-v2
          RETRIEVAL_SIZE: 100
          RERANK_TOP_K: 50
          RRF_K: 60
          FACTOR_NO_SKILLS: 0.5
          FACTOR_EXP_MISMATCH: 0.8
          FACTOR_LOCATION_MATCH: 1.1
          RABBITMQ_HOST: localhost
          RABBITMQ_PORT: 5672
          RABBITMQ_USER: guest
          RABBITMQ_PASS: guest
          CANDIDATE_EXCHANGE_NAME: candidate_events
          DLQ_EXCHANGE_NAME: candidate_events_dlq
          HF_HOME: /tmp/model_cache
        run: |
          cd services/search
          python -m pytest tests/ --cov=app --cov-report=xml -v || true

  build-docker-images:
    needs: [ detect-changes, lint, test-auth, test-bot, test-candidate, test-employer, test-file, test-search ]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [ auth, bot, candidate, employer, file, search ]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build Docker image
        if: needs.detect-changes.outputs[matrix.service] == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          file: ./services/${{ matrix.service }}/Dockerfile
          push: false
          tags: it-recruiter-${{ matrix.service }}:latest

  status-check:
    runs-on: ubuntu-latest
    needs: [ lint, test-auth, test-bot, test-candidate, test-employer, test-file, test-search ]
    if: always()
    steps:
      - name: Check pipeline status
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" == "true" ] || [ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]; then
            echo "Pipeline failed!"
            exit 1
          fi
          echo "All checks passed!"
