name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      auth: ${{ steps.filter.outputs.auth }}
      bot: ${{ steps.filter.outputs.bot }}
      candidate: ${{ steps.filter.outputs.candidate }}
      employer: ${{ steps.filter.outputs.employer }}
      file: ${{ steps.filter.outputs.file }}
      search: ${{ steps.filter.outputs.search }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            auth: 'services/auth/**'
            bot: 'services/bot/**'
            candidate: 'services/candidate/**'
            employer: 'services/employer/**'
            file: 'services/file/**'
            search: 'services/search/**'

  lint:
    needs: [ detect-changes ]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: auth
            changed: ${{ needs.detect-changes.outputs.auth == 'true' }}
          - service: bot
            changed: ${{ needs.detect-changes.outputs.bot == 'true' }}
          - service: candidate
            changed: ${{ needs.detect-changes.outputs.candidate == 'true' }}
          - service: employer
            changed: ${{ needs.detect-changes.outputs.employer == 'true' }}
          - service: file
            changed: ${{ needs.detect-changes.outputs.file == 'true' }}
          - service: search
            changed: ${{ needs.detect-changes.outputs.search == 'true' }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        if: github.event_name != 'pull_request' || matrix.changed
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install Linters
        if: github.event_name != 'pull_request' || matrix.changed
        run: pip install -r requirements-dev-common.txt

      - name: Check formatting with black
        if: github.event_name != 'pull_request' || matrix.changed
        run: black --check services/${{ matrix.service }}/app

      - name: Check import sorting with isort
        if: github.event_name != 'pull_request' || matrix.changed
        run: isort --check-only services/${{ matrix.service }}/app

      - name: Lint with flake8
        if: github.event_name != 'pull_request' || matrix.changed
        run: flake8 services/${{ matrix.service }}/app --count --max-line-length=100 --extend-ignore=E203,W503 --show-source --statistics

  type-check:
    needs: [ detect-changes, lint ]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: auth
            changed: ${{ needs.detect-changes.outputs.auth == 'true' }}
          - service: bot
            changed: ${{ needs.detect-changes.outputs.bot == 'true' }}
          - service: candidate
            changed: ${{ needs.detect-changes.outputs.candidate == 'true' }}
          - service: employer
            changed: ${{ needs.detect-changes.outputs.employer == 'true' }}
          - service: file
            changed: ${{ needs.detect-changes.outputs.file == 'true' }}
          - service: search
            changed: ${{ needs.detect-changes.outputs.search == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - if: github.event_name != 'pull_request' || matrix.changed
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            requirements-dev-common.txt
            services/${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        if: github.event_name != 'pull_request' || matrix.changed
        run: |
          pip install -r requirements-dev-common.txt
          if [ -f services/${{ matrix.service }}/requirements-dev.txt ]; then
            pip install -r services/${{ matrix.service }}/requirements-dev.txt
          else
            pip install -r services/${{ matrix.service }}/requirements.txt
          fi

      - name: Run mypy baseline checks
        if: github.event_name != 'pull_request' || matrix.changed
        run: |
          set -euo pipefail
          cd services/${{ matrix.service }}

          targets=(
            app/config.py
            app/main.py
            app/api/http/v1/api.py
            app/api/http/v1/dependencies.py
            app/worker.py
            app/infrastructure/auth/internal.py
            app/infrastructure/web/exception_handlers.py
            app/infrastructure/web/middleware/request_id.py
            app/infrastructure/web/middleware/idempotency.py
          )

          existing_targets=()
          for target in "${targets[@]}"; do
            if [ -f "$target" ]; then
              existing_targets+=("$target")
            fi
          done

          echo "mypy targets for ${{ matrix.service }}:"
          printf ' - %s\n' "${existing_targets[@]}"

          mypy \
            --ignore-missing-imports \
            --follow-imports=silent \
            --no-strict-optional \
            "${existing_targets[@]}"

  test-auth:
    needs: [ detect-changes, lint, type-check ]
    if: github.event_name != 'pull_request' || needs.detect-changes.outputs.auth == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_auth
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'services/auth/requirements.txt'
          
      - name: Install dependencies
        run: |
          if [ -f services/auth/requirements-dev.txt ]; then
            pip install -r services/auth/requirements-dev.txt
          else
            pip install -r services/auth/requirements.txt
          fi
        
      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_auth
          ENVIRONMENT: local
          LOG_LEVEL: INFO
          SECRET_KEY: test_secret_key_which_is_long_enough_32_chars_min
          TELEGRAM_BOT_TOKEN: 123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 30
          REFRESH_TOKEN_EXPIRE_DAYS: 7
          INTERNAL_BOT_SECRET: test_secret
        run: |
          cd services/auth
          python -m pytest tests/ --cov=app --cov-report=xml --cov-fail-under=50 -v

  test-bot:
    needs: [ detect-changes, lint, type-check ]
    if: github.event_name != 'pull_request' || needs.detect-changes.outputs.bot == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'services/bot/requirements.txt'
          
      - name: Install dependencies
        run: |
          if [ -f services/bot/requirements-dev.txt ]; then
            pip install -r services/bot/requirements-dev.txt
          else
            pip install -r services/bot/requirements.txt
          fi
        
      - name: Run tests with coverage
        env:
          ENVIRONMENT: local
          LOG_LEVEL: INFO
          TELEGRAM_BOT_TOKEN: 123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11
          ADMIN_IDS: "123,456"
          AUTH_SERVICE_URL: http://localhost:8003
          CANDIDATE_SERVICE_URL: http://localhost:8000
          EMPLOYER_SERVICE_URL: http://localhost:8002
          SEARCH_SERVICE_URL: http://localhost:8001
          FILE_SERVICE_URL: http://localhost:8004
          INTERNAL_BOT_SECRET: test_secret
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: |
          cd services/bot
          python -m pytest tests/ --cov=app --cov-report=xml --cov-fail-under=50 -v

  test-candidate:
    needs: [ detect-changes, lint, type-check ]
    if: github.event_name != 'pull_request' || needs.detect-changes.outputs.candidate == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_candidate
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'services/candidate/requirements.txt'
          
      - name: Install dependencies
        run: |
          if [ -f services/candidate/requirements-dev.txt ]; then
            pip install -r services/candidate/requirements-dev.txt
          else
            pip install -r services/candidate/requirements.txt
          fi
        
      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_candidate
          ENVIRONMENT: local
          LOG_LEVEL: INFO
          SECRET_KEY: test_secret_key_which_is_long_enough_32_chars_min
          ALGORITHM: HS256
          RABBITMQ_HOST: localhost
          RABBITMQ_PORT: 5672
          RABBITMQ_USER: guest
          RABBITMQ_PASS: guest
          CANDIDATE_EXCHANGE_NAME: candidate_events
          DLQ_EXCHANGE_NAME: candidate_events_dlq
          CIRCUIT_BREAKER_FAILURE_THRESHOLD: 5
          CIRCUIT_BREAKER_RECOVERY_TIMEOUT: 30
          RATE_LIMIT_DEFAULT: 100/minute
          FILE_SERVICE_URL: http://localhost:8004
          EMPLOYER_SERVICE_URL: http://localhost:8002
        run: |
          cd services/candidate
          python -m pytest tests/ --cov=app --cov-report=xml --cov-fail-under=50 -v

  test-employer:
    needs: [ detect-changes, lint, type-check ]
    if: github.event_name != 'pull_request' || needs.detect-changes.outputs.employer == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_employer
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'services/employer/requirements.txt'
          
      - name: Install dependencies
        run: |
          if [ -f services/employer/requirements-dev.txt ]; then
            pip install -r services/employer/requirements-dev.txt
          else
            pip install -r services/employer/requirements.txt
          fi
        
      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_employer
          ENVIRONMENT: local
          LOG_LEVEL: INFO
          SECRET_KEY: test_secret_key_which_is_long_enough_32_chars_min
          ALGORITHM: HS256
          CANDIDATE_SERVICE_URL: http://localhost:8000
          SEARCH_SERVICE_URL: http://localhost:8001
          CIRCUIT_BREAKER_FAILURE_THRESHOLD: 5
          CIRCUIT_BREAKER_RECOVERY_TIMEOUT: 30
          RATE_LIMIT_DEFAULT: 100/minute
        run: |
          cd services/employer
          python -m pytest tests/ --cov=app --cov-report=xml --cov-fail-under=50 -v

  test-file:
    needs: [ detect-changes, lint, type-check ]
    if: github.event_name != 'pull_request' || needs.detect-changes.outputs.file == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_file
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'services/file/requirements.txt'
          
      - name: Install dependencies
        run: |
          if [ -f services/file/requirements-dev.txt ]; then
            pip install -r services/file/requirements-dev.txt
          else
            pip install -r services/file/requirements.txt
          fi
        
      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_file
          ENVIRONMENT: local
          LOG_LEVEL: INFO
          SECRET_KEY: test_secret_key_which_is_long_enough_32_chars_min
          ALGORITHM: HS256
          S3_ENDPOINT_URL: http://localhost:9000
          S3_ACCESS_KEY: test
          S3_SECRET_KEY: test
          S3_BUCKET_NAME: recruiter-files
          S3_REGION: us-east-1
          MAX_FILE_SIZE: 10485760
          S3_PUBLIC_DOMAIN: http://localhost/s3
        run: |
          cd services/file
          python -m pytest tests/ --cov=app --cov-report=xml --cov-fail-under=50 -v

  test-search:
    needs: [ detect-changes, lint, type-check ]
    if: github.event_name != 'pull_request' || needs.detect-changes.outputs.search == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'services/search/requirements.txt'
          
      - name: Install dependencies
        run: |
          if [ -f services/search/requirements-dev.txt ]; then
            pip install -r services/search/requirements-dev.txt
          else
            pip install -r services/search/requirements.txt
          fi
        
      - name: Run tests with coverage
        env:
          ENVIRONMENT: local
          LOG_LEVEL: INFO
          SECRET_KEY: test_secret_key
          ALGORITHM: HS256
          ELASTICSEARCH_URL: http://localhost:9200
          CANDIDATE_INDEX_ALIAS: candidates
          MILVUS_HOST: localhost
          MILVUS_PORT: 19530
          MILVUS_COLLECTION_NAME: candidates_embeddings
          CANDIDATE_SERVICE_URL: http://localhost:8000
          SENTENCE_MODEL_NAME: paraphrase-multilingual-mpnet-base-v2
          RANKER_MODEL_NAME: cross-encoder/ms-marco-MiniLM-L-6-v2
          RETRIEVAL_SIZE: 100
          RERANK_TOP_K: 50
          RRF_K: 60
          FACTOR_NO_SKILLS: 0.5
          FACTOR_EXP_MISMATCH: 0.8
          FACTOR_LOCATION_MATCH: 1.1
          RABBITMQ_HOST: localhost
          RABBITMQ_PORT: 5672
          RABBITMQ_USER: guest
          RABBITMQ_PASS: guest
          CANDIDATE_EXCHANGE_NAME: candidate_events
          DLQ_EXCHANGE_NAME: candidate_events_dlq
          HF_HOME: /tmp/model_cache
        run: |
          cd services/search
          python -m pytest tests/ --cov=app --cov-report=xml --cov-fail-under=50 -v

  integration-tests:
    needs: [ detect-changes, lint, test-auth, test-bot, test-candidate, test-employer, test-file, test-search ]
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [ auth, candidate, employer, file, search ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'services/${{ matrix.service }}/requirements.txt'

      - name: Install dependencies
        run: |
          if [ -f services/${{ matrix.service }}/requirements-dev.txt ]; then
            pip install -r services/${{ matrix.service }}/requirements-dev.txt
          else
            pip install -r services/${{ matrix.service }}/requirements.txt
          fi

      - name: Run integration tests
        env:
          RUN_INTEGRATION: '1'
        run: |
          cd services/${{ matrix.service }}
          python -m pytest tests/integration -v

  build-docker-images:
    needs: [ detect-changes, lint, test-auth, test-bot, test-candidate, test-employer, test-file, test-search ]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: auth
            changed: ${{ needs.detect-changes.outputs.auth == 'true' }}
          - service: bot
            changed: ${{ needs.detect-changes.outputs.bot == 'true' }}
          - service: candidate
            changed: ${{ needs.detect-changes.outputs.candidate == 'true' }}
          - service: employer
            changed: ${{ needs.detect-changes.outputs.employer == 'true' }}
          - service: file
            changed: ${{ needs.detect-changes.outputs.file == 'true' }}
          - service: search
            changed: ${{ needs.detect-changes.outputs.search == 'true' }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build Docker image
        if: matrix.changed
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          file: ./services/${{ matrix.service }}/Dockerfile
          push: false
          tags: it-recruiter-${{ matrix.service }}:latest

  status-check:
    runs-on: ubuntu-latest
    needs: [ lint, type-check, test-auth, test-bot, test-candidate, test-employer, test-file, test-search, integration-tests ]
    if: always()
    steps:
      - name: Check pipeline status
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" == "true" ] || [ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]; then
            echo "Pipeline failed!"
            exit 1
          fi
          echo "All checks passed!"
