name: Security

on:
  pull_request:
    branches: [ main ]
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Dependency review
        uses: actions/dependency-review-action@v4

  pip-audit:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        req_file:
          - requirements-dev-common.txt
          - services/auth/requirements.txt
          - services/auth/requirements-dev.txt
          - services/bot/requirements.txt
          - services/bot/requirements-dev.txt
          - services/candidate/requirements.txt
          - services/candidate/requirements-dev.txt
          - services/employer/requirements.txt
          - services/employer/requirements-dev.txt
          - services/file/requirements.txt
          - services/file/requirements-dev.txt
          - services/search/requirements.txt
          - services/search/requirements-dev.txt
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pip-audit
        run: pip install pip-audit==2.7.3
      - name: Audit dependencies
        run: pip-audit -r "${{ matrix.req_file }}"
