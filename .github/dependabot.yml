      interval: "weekly"
      day: "monday"
      time: "03:25"

  - package-ecosystem: "pip"
    directory: "/services/employer"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:30"

  - package-ecosystem: "pip"
    directory: "/services/file"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:35"

  - package-ecosystem: "pip"
    directory: "/services/search"
    schedule:
      interval: "weekly"
      day: "monday"
