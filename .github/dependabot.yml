    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"

  - package-ecosystem: "pip"
    directory: "/services/auth"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:15"

  - package-ecosystem: "pip"
    directory: "/services/bot"
