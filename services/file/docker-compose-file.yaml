version: "3.9"

services:
  file-service-db:
    image: postgres:16
    container_name: file-service-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - file_service_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  file-service-minio:
    image: minio/minio:latest
    container_name: file-service-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - file_service_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

  file-service-rabbitmq:
    image: rabbitmq:3.13-management
    container_name: file-service-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT}:15672"
    volumes:
      - file_service_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  file-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: file-service
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      file-service-db:
        condition: service_healthy
      file-service-minio:
        condition: service_healthy
      file-service-rabbitmq:
        condition: service_healthy
    ports:
      - "${APP_PORT}:8000"
    volumes:
      - .:/app
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload

  file-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: file-worker
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      file-service-db:
        condition: service_healthy
      file-service-minio:
        condition: service_healthy
      file-service-rabbitmq:
        condition: service_healthy
    volumes:
      - .:/app
    command: >
      python -m app.worker

volumes:
  file_service_postgres_data:
  file_service_minio_data:
  file_service_rabbitmq_data:
