global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'microservices'
    metrics_path: '/metrics'
    static_configs:
      - targets: 
        - 'auth-service:8000'
        - 'candidate-api:8000'
        - 'employer-service:8000'
        - 'search-service:8000'
        - 'file-service:8000'
