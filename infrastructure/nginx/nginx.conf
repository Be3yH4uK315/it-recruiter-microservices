events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/json;

    sendfile        on;
    keepalive_timeout  65;

    log_format json_combined escape=json
      '{'
        '"time_local":"$time_local",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"status": "$status",'
        '"body_bytes_sent":"$body_bytes_sent",'
        '"request_time":"$request_time",'
        '"http_referrer":"$http_referer",'
        '"http_user_agent":"$http_user_agent"'
      '}';

    access_log /var/log/nginx/access.log json_combined;

    upstream auth_service {
        server auth-service:8000;
    }

    upstream candidate_service {
        server candidate-api:8000;
    }

    upstream employer_service {
        server employer-service:8000;
    }

    upstream search_service {
        server search-service:8000;
    }

    upstream file_service {
        server file-service:8000;
    }

    upstream minio_s3 {
        server minio:9000;
    }

    server {
        listen 80;
        server_name localhost;

        client_max_body_size 10M;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Telegram-ID' always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # --- ROUTES ---

        # 1. Auth Service
        location /v1/auth/ {
            proxy_pass http://auth_service/v1/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 2. Candidate Service
        location /v1/candidates/ {
            proxy_pass http://candidate_service/v1/candidates/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 3. Employer Service
        location /v1/employers/ {
            proxy_pass http://employer_service/v1/employers/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 4. Search Service
        location /v1/search/ {
            proxy_pass http://search_service/v1/search/;
            proxy_read_timeout 60s; 
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 5. File Service
        location /v1/files/ {
            proxy_pass http://file_service/v1/files/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        
        # 6. MinIO S3
        location /s3/ {
            rewrite ^/s3/(.*) /$1 break;
            proxy_pass http://minio_s3;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            client_max_body_size 10M;
        }

        # Healthcheck самого Gateway
        location /health {
            access_log off;
            return 200 '{"status":"UP"}';
        }
    }
}