apiVersion: 1

groups:
  - orgId: 1
    name: Microservices SLO Alerts
    folder: Microservices
    interval: 1m
    rules:
      - uid: microservice_down
        title: Microservice Down
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              editorMode: code
              expr: min_over_time(up{job="microservices"}[2m])
              instant: true
              intervalMs: 1000
              legendFormat: "{{app_name}}"
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                name: Expression
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
        noDataState: Alerting
        execErrState: Alerting
        for: 2m
        annotations:
          summary: "Service {{ $labels.app_name }} is down"
          description: "Prometheus up metric for {{ $labels.app_name }} is 0 for at least 2 minutes."
        labels:
          severity: critical
          category: availability
        isPaused: false

      - uid: microservice_high_5xx_rate
        title: High 5xx Error Rate
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              editorMode: code
              expr: |
                sum by (app_name) (rate(http_requests_total{job="microservices",status=~"5.."}[5m]))
                /
                clamp_min(sum by (app_name) (rate(http_requests_total{job="microservices"}[5m])), 0.001)
              instant: true
              intervalMs: 1000
              legendFormat: "{{app_name}}"
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 0.05
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                name: Expression
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
        noDataState: NoData
        execErrState: Alerting
        for: 10m
        annotations:
          summary: "High 5xx rate in {{ $labels.app_name }}"
          description: "5xx ratio for {{ $labels.app_name }} is above 5% for at least 10 minutes."
        labels:
          severity: warning
          category: errors
        isPaused: false

      - uid: microservice_high_p95_latency
        title: High p95 Latency
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              editorMode: code
              expr: |
                histogram_quantile(
                  0.95,
                  sum by (app_name, le) (
                    rate(http_request_duration_seconds_bucket{job="microservices"}[5m])
                  )
                )
              instant: true
              intervalMs: 1000
              legendFormat: "{{app_name}}"
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 1
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                name: Expression
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
        noDataState: NoData
        execErrState: Alerting
        for: 10m
        annotations:
          summary: "High p95 latency in {{ $labels.app_name }}"
          description: "p95 latency of {{ $labels.app_name }} is above 1 second for at least 10 minutes."
        labels:
          severity: warning
          category: latency
        isPaused: false
